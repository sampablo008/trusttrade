name: Migrate Production DB

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"

# Only one migration run at a time — never let two pushes race db push.
concurrency:
  group: migrate-production
  cancel-in-progress: false

jobs:
  migrate:
    name: Supabase db push (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref ${{ secrets.PRODUCTION_PROJECT_ID }}

      - name: Show pending migrations (dry run)
        run: supabase db push --dry-run

      - name: Apply migrations to production
        run: supabase db push
