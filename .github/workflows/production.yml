name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Supabase Migrate (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref ${{ secrets.PRODUCTION_PROJECT_ID }}

      - name: Show pending migrations (dry run)
        run: supabase db push --dry-run

      - name: Apply migrations to production
        run: supabase db push

  deploy-production:
    name: Vercel Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    needs: migrate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Run post-deploy smoke tests
        env:
          BASE_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          # Basic health checks
          curl -sf "$BASE_URL" > /dev/null && echo "Homepage OK"
          curl -sf "$BASE_URL/api/tokens" > /dev/null && echo "Tokens API OK"
          curl -sf "$BASE_URL/api/periods" > /dev/null && echo "Periods API OK"
